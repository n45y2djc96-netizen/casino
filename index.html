<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golden Spin</title>

  <style>
  body {
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background:
radial-gradient(circle at top, rgba(255,215,0,0.15), transparent 40%),
linear-gradient(180deg,#050505,#0b0b0b,#000);
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

    :root {
      --primary-gold: #FFD700;
      --dark-bg: #0a0e27;
      --card-bg: #1a1f3a;
      --accent-purple: #9d4edd;
      --accent-cyan: #00d9ff;
      --text-light: #e0e0e0;
      --text-bright: #ffffff;
    }

    body {
      font-family: 'Arial', sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-light);
      overflow-x: hidden;
    }

    .background-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(157, 78, 221, 0.15), transparent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(157, 78, 221, 0.1));
      border-bottom: 2px solid var(--primary-gold);
      position: relative;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
    }

    .logo {
    .logo{
font-size:34px;
font-weight:900;
letter-spacing:3px;
color:#FFD700;
text-shadow:
0 0 10px rgba(255,215,0,.8),
0 0 25px rgba(255,215,0,.6),
0 0 50px rgba(255,215,0,.4);
}

    .balance-box {
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(135deg, var(--primary-gold), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 10px 20px;
      border: 2px solid var(--primary-gold);
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 5;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
      padding: 40px;
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.15), rgba(0, 217, 255, 0.1));
      border-radius: 20px;
      border: 2px solid var(--accent-purple);
      box-shadow: 0 0 30px rgba(157, 78, 221, 0.3);
    }

    .spin-button {
      padding: 20px 50px;
      font-size: 24px;
      font-weight: bold;
      color: var(--dark-bg);
      background: linear-gradient(135deg, var(--primary-gold), #ffed4e);
      border: none;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .spin-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(255, 215, 0, 0.6);
    }

    .spin-button:active {
      transform: scale(0.98);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
    }

    .spin-button.spinning {
      animation: spin-rotate 0.6s ease-in-out;
    }

    @keyframes spin-rotate {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.05); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .game-card {
      padding: 30px;
      background: linear-gradient(135deg, var(--card-bg), rgba(157, 78, 221, 0.2));
      border: 2px solid var(--accent-cyan);
      border-radius: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 217, 255, 0.2);
      color: var(--accent-cyan);
    }

    .game-card:hover {
      transform: translateY(-10px);
      background: linear-gradient(135deg, var(--card-bg), rgba(157, 78, 221, 0.4));
      box-shadow: 0 8px 30px rgba(0, 217, 255, 0.4);
      color: var(--primary-gold);
      border-color: var(--primary-gold);
    }

    .leaderboard {
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.15), var(--card-bg));
      padding: 40px;
      border-radius: 20px;
      border: 2px solid var(--accent-purple);
      margin-bottom: 60px;
      box-shadow: 0 8px 25px rgba(157, 78, 221, 0.3);
    }

    .leaderboard h2 {
      font-size: 28px;
      margin-bottom: 30px;
      color: var(--primary-gold);
      text-shadow: 0 0 10px var(--primary-gold);
    }

    .player {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      margin-bottom: 12px;
      background: rgba(0, 217, 255, 0.05);
      border-left: 4px solid var(--accent-cyan);
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .player:hover {
      background: rgba(0, 217, 255, 0.15);
      transform: translateX(10px);
    }

    .player span:first-child {
      font-weight: bold;
      color: var(--accent-cyan);
    }

    .player span:last-child {
      font-weight: bold;
      color: var(--primary-gold);
      font-size: 18px;
    }

    .bonus {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(157, 78, 221, 0.15));
      padding: 40px;
      border-radius: 20px;
      border: 2px solid var(--primary-gold);
      text-align: center;
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
    }

    .bonus h2 {
      font-size: 28px;
      margin-bottom: 25px;
      color: var(--primary-gold);
      text-shadow: 0 0 10px var(--primary-gold);
    }

    .bonus-btn {
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      color: var(--dark-bg);
      background: linear-gradient(135deg, var(--primary-gold), #ffed4e);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .bonus-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.5);
    }

    .bonus-btn:active {
      transform: scale(0.98);
    }

    .bonus-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
        gap: 15px;
        padding: 15px 20px;
      }

      .logo {
        font-size: 22px;
      }

      .balance-box {
        font-size: 16px;
      }

      main {
        padding: 20px 10px;
      }

      .hero {
        padding: 25px;
      }

      .spin-button {
        padding: 15px 30px;
        font-size: 18px;
      }

      .games {
        grid-template-columns: 1fr;
      }

      .leaderboard,
      .bonus {
        padding: 25px;
      }

      .leaderboard h2,
      .bonus h2 {
        font-size: 22px;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main {
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="background-glow"></div>

  <header class="topbar">
    <div class="logo">👑 GOLDEN SPIN</div>

    <div class="balance-box">
      💰 12,500
    </div>
  </header>

  <main>

    <section class="hero">
      <button class="spin-button">
        🎰 ИГРАТЬ / SPIN
      </button>
    </section>

    <section class="games">
      <div class="game-card">🎰 Слоты</div>
      <div class="game-card">🎡 Рулетка</div>
      <div class="game-card">🎲 Мини-игры</div>
    </section>

    <section class="leaderboard">
      <h2>🏆 Турнир лидеров</h2>

      <div class="player">
        <span>1. GoldKing</span>
        <span>15,300</span>
      </div>

      <div class="player">
        <span>2. LuckyAce</span>
        <span>12,500</span>
      </div>

      <div class="player">
        <span>3. VelvetJack</span>
        <span>10,200</span>
      </div>
    </section>

    <section class="bonus">
      <h2>🎁 Ежедневный бонус</h2>

      <button class="bonus-btn">
        ЗАБРАТЬ
      </button>
    </section>

  </main>

  <script>
    const gameState = {
      balance: 12500,
      dailyBonusClaimed: false,
      spinInProgress: false,
      lastBonusTime: null,
    };

    const balanceBox = document.querySelector('.balance-box');
    const spinButton = document.querySelector('.spin-button');
    const bonusBtn = document.querySelector('.bonus-btn');
    const gameCards = document.querySelectorAll('.game-card');

    document.addEventListener('DOMContentLoaded', () => {
      initializeGame();
      setupEventListeners();
      restoreDailyBonusState();
    });

    function setupEventListeners() {
      spinButton.addEventListener('click', handleSpin);
      bonusBtn.addEventListener('click', handleDailyBonus);
      gameCards.forEach((card) => {
        card.addEventListener('click', handleGameClick);
      });
    }

    function updateBalance(amount) {
      gameState.balance = Math.max(0, gameState.balance + amount);
      balanceBox.textContent = `💰 ${gameState.balance.toLocaleString()}`;
      saveGameState();
    }

    function handleSpin() {
      if (gameState.spinInProgress || gameState.balance < 100) {
        if (gameState.balance < 100) {
          showNotification('Недостаточно средств!', 'error');
        }
        return;
      }

      gameState.spinInProgress = true;
      spinButton.disabled = true;
      spinButton.classList.add('spinning');

      updateBalance(-100);

      setTimeout(() => {
        const result = performSpin();
        showSpinResult(result);
        gameState.spinInProgress = false;
        spinButton.disabled = false;
        spinButton.classList.remove('spinning');
      }, 1500);
    }

    function performSpin() {
      const outcomes = [
        { probability: 0.6, multiplier: 0, message: '❌ Не повезло!', type: 'loss' },
        { probability: 0.25, multiplier: 5, message: '✨ Неплохо!', type: 'win' },
        { probability: 0.1, multiplier: 15, message: '🎉 Большой выигрыш!', type: 'bigwin' },
        { probability: 0.05, multiplier: 50, message: '🤑 ДЖЕКПОТ!!!', type: 'jackpot' },
      ];

      const random = Math.random();
      let cumulative = 0;

      for (const outcome of outcomes) {
        cumulative += outcome.probability;
        if (random <= cumulative) {
          const winAmount = 100 * outcome.multiplier;
          if (outcome.multiplier > 0) {
            updateBalance(winAmount);
          }
          return outcome;
        }
      }
    }

    function showSpinResult(result) {
      const message = result.message;
      const type = result.type;

      showNotification(message, type);

      if (result.multiplier > 0) {
        playWinAnimation();
      }
    }

    function handleDailyBonus() {
      if (gameState.dailyBonusClaimed) {
        showNotification('Бонус уже получен. Вернитесь завтра!', 'info');
        return;
      }

      const bonusAmount = 500;
      updateBalance(bonusAmount);
      gameState.dailyBonusClaimed = true;
      gameState.lastBonusTime = new Date().getTime();

      bonusBtn.disabled = true;
      bonusBtn.textContent = 'ПОЛУЧЕНО ✓';

      showNotification(`+${bonusAmount} бонус!`, 'success');

      resetDailyBonusAtMidnight();
    }

    function resetDailyBonusAtMidnight() {
      const now = new Date();
      const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      const timeUntilMidnight = tomorrow.getTime() - now.getTime();

      setTimeout(() => {
        gameState.dailyBonusClaimed = false;
        gameState.lastBonusTime = null;
        bonusBtn.disabled = false;
        bonusBtn.textContent = 'ЗАБРАТЬ';
        saveGameState();
        resetDailyBonusAtMidnight();
      }, timeUntilMidnight);
    }

    function handleGameClick(e) {
      const gameType = e.target.textContent;
      showNotification(`Переход к: ${gameType}`, 'info');
    }

    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        z-index: 1000;
        animation: slideIn 0.3s ease-out;
        max-width: 400px;
        word-wrap: break-word;
      `;

      const colors = {
        success: { bg: '#4caf50', text: '#fff' },
        error: { bg: '#f44336', text: '#fff' },
        info: { bg: '#2196F3', text: '#fff' },
        win: { bg: '#FFD700', text: '#0a0e27' },
        bigwin: { bg: '#9d4edd', text: '#fff' },
        jackpot: { bg: '#FF6B9D', text: '#fff' },
        loss: { bg: '#FF6B6B', text: '#fff' },
      };

      const color = colors[type] || colors.info;
      notification.style.backgroundColor = color.bg;
      notification.style.color = color.text;
      notification.textContent = message;

      document.body.appendChild(notification);

      setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease-out';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    function playWinAnimation() {
      const confetti = document.createElement('div');
      confetti.style.cssText = `
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 500;
      `;

      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.textContent = ['🎉', '✨', '⭐', '💰'][Math.floor(Math.random() * 4)];
        particle.style.cssText = `
          position: absolute;
          font-size: ${20 + Math.random() * 20}px;
          left: ${Math.random() * 100}%;
          top: -20px;
          animation: fall ${2 + Math.random() * 2}s linear forwards;
          opacity: 1;
        `;
        confetti.appendChild(particle);
      }

      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 4000);
    }

    function saveGameState() {
      const state = {
        balance: gameState.balance,
        dailyBonusClaimed: gameState.dailyBonusClaimed,
        lastBonusTime: gameState.lastBonusTime,
      };
      localStorage.setItem('goldenSpinState', JSON.stringify(state));
    }

    function restoreDailyBonusState() {
      const saved = localStorage.getItem('goldenSpinState');
      if (saved) {
        const state = JSON.parse(saved);
        gameState.balance = state.balance;
        gameState.lastBonusTime = state.lastBonusTime;

        if (state.lastBonusTime) {
          const lastBonusDate = new Date(state.lastBonusTime);
          const today = new Date();

          if (
            lastBonusDate.getDate() !== today.getDate() ||
            lastBonusDate.getMonth() !== today.getMonth() ||
            lastBonusDate.getFullYear() !== today.getFullYear()
          ) {
            gameState.dailyBonusClaimed = false;
            gameState.lastBonusTime = null;
          } else {
            gameState.dailyBonusClaimed = true;
            bonusBtn.disabled = true;
            bonusBtn.textContent = 'ПОЛУЧЕНО ✓';
          }
        }

        updateBalance(0);
        resetDailyBonusAtMidnight();
      }
    }

    function initializeGame() {
      updateBalance(0);
      console.log('🎰 Golden Spin initialized!');
    }
  </script>

</body>
</html>
